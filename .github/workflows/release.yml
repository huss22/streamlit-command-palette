name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: src/streamlit_command_palette/frontend
        run: npm install

      - name: Build frontend
        working-directory: src/streamlit_command_palette/frontend
        run: npm run build

      - name: Run tests
        run: pytest

      - name: Run Ruff
        run: ruff check .

      - name: Validate Trove classifiers
        run: python scripts/validate_classifiers.py

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
