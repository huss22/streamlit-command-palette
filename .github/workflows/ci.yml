name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  quality:
    name: Quality and package build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: src/streamlit_command_palette/frontend
        run: npm install

      - name: Typecheck frontend
        working-directory: src/streamlit_command_palette/frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: src/streamlit_command_palette/frontend
        run: npm run build

      - name: Run Ruff
        run: ruff check .

      - name: Validate Trove classifiers
        run: python scripts/validate_classifiers.py

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*
